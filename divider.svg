<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 20" width="100%" height="auto" role="img" aria-label="divider">
  <style>
    @media (prefers-color-scheme: light) { .line { stroke:#1F2328; } .n { fill:#3776AB; } }
  </style>
  <path id="dpath" d="M 60 10 H 540" fill="none"/>
  <line class="line" x1="60" y1="10" x2="285" y2="10" stroke="#3776AB" stroke-width="0.6" opacity="0.5"/>
  <circle class="n" cx="280" cy="10" r="2.4" fill="#3776AB">
    <animate attributeName="r" values="2.4;3.6;2.4" dur="3.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="10" r="2.4" fill="#FF4713">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="10" r="2.4" fill="#3776AB">
    <animate attributeName="r" values="2.4;3.6;2.4" dur="3.4s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <line class="line" x1="315" y1="10" x2="540" y2="10" stroke="#3776AB" stroke-width="0.6" opacity="0.5"/>
  <circle r="1.6" fill="#FF4713">
    <animateMotion dur="5s" begin="1.2s" repeatCount="indefinite">
      <mpath href="#dpath"/>
    </animateMotion>
  </circle>
</svg>